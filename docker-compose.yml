services:

  postgres:
    image: postgres:16-alpine
    container_name: hiraoka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
       - postgres_data:/var/lib/postgresql/data
       - ./services/auth-service/src/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
       - ./services/auth-service/src/db/audit.sql:/docker-entrypoint-initdb.d/02_audit.sql:ro
       - ./services/auth-service/src/db/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    networks:
      - hiraoka_network

  db-seed:
    image: postgres:16-alpine
    container_name: hiraoka_db_seed
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      - postgres
    volumes:
      - ./services/auth-service/src/db:/db:ro
    command: >
      sh -c "until pg_isready -h postgres -U ${DB_USER} -d ${DB_NAME}; do sleep 1; done;
      psql -h postgres -U ${DB_USER} -d ${DB_NAME} -v ON_ERROR_STOP=1
      -f /db/init.sql -f /db/audit.sql -f /db/seed.sql"
    networks:
      - hiraoka_network

  auth-service:
    build: ./services/auth-service
    container_name: hiraoka_auth
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${AUTH_SERVICE_PORT:-3001}
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-30m}
    depends_on:
      postgres:
        condition: service_started
      db-seed:
        condition: service_completed_successfully
    networks:
      - hiraoka_network

  api-gateway:
    build: ./services/api-gateway
    container_name: hiraoka_gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TICKET_SERVICE_URL=http://ticket-service:3002
      - TALLER_SERVICE_URL=http://taller-service:3003
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://notification-service:3004}
    depends_on:
      - auth-service
      - ticket-service
      - taller-service
      - notification-service
    networks:
      - hiraoka_network

  ticket-service:
    build: ./services/ticket-service
    container_name: hiraoka_ticket
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${TICKET_SERVICE_PORT:-3002}
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://notification-service:3004}
      - NOTIFICATION_TIMEOUT_MS=${NOTIFICATION_TIMEOUT_MS:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,http://localhost:80}
    depends_on:
      postgres:
        condition: service_started
      db-seed:
        condition: service_completed_successfully
    networks:
      - hiraoka_network

  nginx:
    image: nginx:alpine
    container_name: hiraoka_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    networks:
      - hiraoka_network

  taller-service:
      build: ./services/taller-service
      container_name: hiraoka_taller
      restart: unless-stopped
      environment:
        - NODE_ENV=${NODE_ENV:-development}
        - PORT=${TALLER_SERVICE_PORT:-3003}
        - DB_HOST=postgres
        - DB_USER=${DB_USER}
        - DB_PASSWORD=${DB_PASSWORD}
        - DB_NAME=${DB_NAME}
        - JWT_SECRET=${JWT_SECRET}
        - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,http://localhost:80}
      depends_on:
        postgres:
          condition: service_started
        db-seed:
          condition: service_completed_successfully
      networks:
        - hiraoka_network

  notification-service:
      build: ./services/notification-service
      container_name: hiraoka_notification
      restart: unless-stopped
      environment:
        - NODE_ENV=${NODE_ENV:-development}
        - PORT=${NOTIFICATION_SERVICE_PORT:-3004}
        - SENDGRID_API_KEY=${SENDGRID_API_KEY}
        - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
        - PORTAL_URL=${PORTAL_URL:-http://localhost}
        - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost,http://localhost:80}
      depends_on:
        - postgres
      networks:
        - hiraoka_network

volumes:
  postgres_data:

networks:
  hiraoka_network:
    driver: bridge
