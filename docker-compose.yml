services:

  postgres:
    image: postgres:16-alpine
    container_name: hiraoka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/auth-service/src/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./services/auth-service/src/db/audit.sql:/docker-entrypoint-initdb.d/02_audit.sql:ro
    networks:
      - hiraoka_network

  auth-service:
    build: ./services/auth-service
    container_name: hiraoka_auth
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=30m
    depends_on:
      - postgres
    networks:
      - hiraoka_network

  api-gateway:
    build: ./services/api-gateway
    container_name: hiraoka_gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - TICKET_SERVICE_URL=http://ticket-service:3002
    depends_on:
      - auth-service
      - ticket-service
    networks:
      - hiraoka_network

  ticket-service:
    build: ./services/ticket-service
    container_name: hiraoka_ticket
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - postgres
    networks:
      - hiraoka_network

  nginx:
    image: nginx:alpine
    container_name: hiraoka_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    networks:
      - hiraoka_network

volumes:
  postgres_data:

networks:
  hiraoka_network:
    driver: bridge
