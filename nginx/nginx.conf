# nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Redirigir HTTP → HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name hiraoka-services.duckdns.org localhost;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS principal ────────────────────────────────
    server {
        listen 443 ssl;
        server_name hiraoka-services.duckdns.org localhost;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # TLS 1.3 — según DAS sección 2.2
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # ── Todo el tráfico va al API Gateway ──────────────────
        # Nadie accede directo a auth-service ni otros microservicios
        location / {
            proxy_pass         http://api-gateway:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api-gateway:3000/health;
        }
    }
}